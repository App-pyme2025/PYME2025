<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login – PYME2025</title>
  <style>
    :root {
      --azul-claro: #5DADE2;
      --gris-claro: #E5E7E9;
      --gris-oscuro: #566573;
      --blanco: #FFFFFF;
    }
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--gris-claro);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .cajalogin {
      background: var(--blanco);
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }

    .cajalogin h1 {
      margin-bottom: 20px;
      color: var(--azul-claro);
    }

    .cajalogin input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid var(--gris-oscuro);
      border-radius: 4px;
    }

    .cajalogin button {
      width: 100%;
      padding: 10px;
      margin: 12px 0;
      border: none;
      border-radius: 4px;
      background: var(--azul-claro);
      color: var(--blanco);
      cursor: pointer;
      font-size: 1em;
    }

    .cajalogin button.google {
      background: #ea4335;
    }

    .pie {
      display: flex;
      justify-content: space-between;
      font-size: 0.9em;
    }

    .pie a {
      color: var(--gris-oscuro);
      text-decoration: none;
    }

    .pie a:hover {
      text-decoration: underline;
    }

    #msg {
      color: red;
      min-height: 1.2em;
    }

    /* ============ MODAL RESET PASSWORD ============ */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal.hidden {
      display: none;
    }

    .modal-content {
      background: var(--blanco);
      padding: 20px;
      border-radius: 8px;
      width: 300px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .modal-content h2 {
      margin-top: 0;
      color: var(--azul-claro);
    }

    .modal-content input {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      border: 1px solid var(--gris-oscuro);
      border-radius: 4px;
    }

    .modal-content .msg {
      height: 1.2em;
      color: red;
      font-size: 0.9em;
      margin-bottom: 10px;
    }

    .modal-content button {
      width: 48%;
      margin: 5px 1%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
    }

    .modal-content button.send {
      background: var(--azul-claro);
      color: var(--blanco);
    }

    .modal-content button.cancel {
      background: var(--gris-oscuro);
      color: var(--blanco);
    }
    /* ================================================ */
  </style>
</head>
<body>

  <div class="cajalogin">
    <h1>Acceso PYME2025</h1>

    <form id="login-form">
      <input id="login-id"
             type="email"
             placeholder="Nombre de usuario / Email"
             required>
      <input id="login-password"
             type="password"
             placeholder="Contraseña"
             required>
      <button id="login-btn" type="submit">Acceso</button>
      <div id="msg"></div>
    </form>

    <button id="google-btn" class="google">Acceso con Google</button>

    <div class="pie">
      <a id="reset-btn" href="#">Recuperar contraseña</a>
      <a id="register-btn" href="#">Registro nuevo usuario</a>
    </div>
  </div>

  <!-- Modal de recuperación de contraseña -->
  <div id="reset-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Recuperar Contraseña</h2>
      <input id="reset-email-input"
             type="email"
             placeholder="Ingresa tu correo"
             required>
      <div id="reset-msg" class="msg"></div>
      <button id="reset-submit-btn" class="send">Enviar link</button>
      <button id="reset-cancel-btn" class="cancel">Cancelar</button>
    </div>
  </div>

  <script type="module" src="../src/script.js"></script>
</body>
</html>
