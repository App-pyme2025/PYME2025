<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login – PYME2025</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header><h1>Acceso a PYME2025</h1></header>

    <form id="login-form">

      <p id="msg"></p>
    </form>
  </section>
  <script type="module" src="../src/script.js"></script>
</body>
</html>
