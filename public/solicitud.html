<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Solicitud de Alta – PYME2025</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header><h1>Solicitar Cuenta</h1></header>
  <section>
    <form id="solicitud-form">
      <!-- Obligatorios -->
      <input name="full_name" placeholder="Nombre completo" required>
      <input name="address"    placeholder="Dirección"      required>
      <input name="phone"      placeholder="Teléfono"         required>
      <input type="email" name="email" placeholder="Correo"  required>
      <input name="emergency_phone"    placeholder="Tel. emergencia" required>
